name: Epic Awesome Gamer (Scheduled)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每周四 UTC 15:20 运行一次（北京时间周四 23:20）
    # 该时间点放在 Epic 周免刷新之后，避免过早触发。
    - cron: '20 15 * * 4'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # 默认不在主仓库自身执行定时任务；Fork 后的仓库会正常运行。
    if: github.repository != 'Ronchy2000/epic-freebies-helper'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/Ronchy2000/epic-freebies-helper.git 2>/dev/null || true
          git fetch upstream master
          if [ "$(git rev-list HEAD..upstream/master --count)" -gt 0 ]; then
            echo "🔄 Merging $(git rev-list HEAD..upstream/master --count) upstream commits..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git merge upstream/master --no-edit
            git push origin master
          else
            echo "✅ Already up to date with upstream."
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev

      - name: Install dependencies
        run: uv sync

      # 增加 GITHUB_TOKEN 以降低 Camoufox 下载时的 403 频率限制。
      # 即使这里失败，运行时也可以回退到 Playwright Firefox。
      - name: Install Camoufox
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      - name: Install Playwright Firefox fallback
        run: uv run playwright install firefox

      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
          CHALLENGE_CLASSIFIER_MODEL: ${{ secrets.CHALLENGE_CLASSIFIER_MODEL }}
          IMAGE_CLASSIFIER_MODEL: ${{ secrets.IMAGE_CLASSIFIER_MODEL }}
          SPATIAL_POINT_REASONER_MODEL: ${{ secrets.SPATIAL_POINT_REASONER_MODEL }}
          SPATIAL_PATH_REASONER_MODEL: ${{ secrets.SPATIAL_PATH_REASONER_MODEL }}
          BROWSER_BACKEND: auto
          DISABLE_BEZIER_TRAJECTORY: false
          # 在 Actions 中我们依靠 GitHub 的 cron 触发，所以关闭内部调度器
          ENABLE_APSCHEDULER: false
          MPLBACKEND: Agg
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: app
        run: |
          echo "🚀 启动定时领取任务（支持 Gemini/AiHubMix/GLM）..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py

      - name: Write success summary
        if: success()
        run: |
          {
            echo "## Run completed"
            echo
            echo "The workflow completed successfully."
            echo
            echo "- Share successful runs here: [Share your successful runs here / 成功领取的来这里留言！ #3](https://github.com/Ronchy2000/epic-freebies-helper/discussions/3)"
            echo "- If the game was already in your library, Epic may not send a separate confirmation email. Review the logs and artifacts when verification is needed."
            echo "- If you later report an issue from a private fork, upload the artifact zip files because maintainers cannot access private Actions pages."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: epic-runtime-${{ github.run_id }}
          path: app/volumes/runtime/
          retention-days: 7

      - name: Upload log artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: epic-logs-${{ github.run_id }}
          path: app/volumes/logs/
          retention-days: 7

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: epic-screenshots-${{ github.run_id }}
          path: app/volumes/screenshots/
          retention-days: 7
